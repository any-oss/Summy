name: Production Docker Build & Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # ✅ Use the environment where your secrets actually exist
    environment: github-actions

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # ✅ Use the exact secret names you have
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build
        run: docker build -t anydockerhub/summy:tagname .

      - name: Push
        run: docker push anydockerhub/summy:tagname
