name: Production Docker Build & Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # ⚠️ CRITICAL: This line activates the "Docker" environment secrets (USER & PASS)
    environment: Docker

    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Now using the ENVIRONMENT secrets instead of repo secrets
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
      
      - name: Build
        run: docker build -t anydockerhub/summy:tagname .
      
      - name: Push
        run: docker push anydockerhub/summy:tagname
