version: "1.4.0"
host: "0.0.0.0"
port: 8000
auth:
  enabled: false
  token: ""
models:
  map:
    code_generation: "deepseek-coder:1.3b-q4_K_M"
    reasoning: "tinyllama:1.1b-q5_K_M"
    tool: "phi:2-q4_K_M"
  default: "tinyllama:1.1b-q5_K_M"
ollama:
  endpoint: "http://ollama:11434/api/generate"
  max_retries: 3
  retry_delay: 1.0
  timeout: 120.0
  connect_timeout: 10.0
  options:
    num_predict: 512
    temperature: 0.3
claude:
  enabled: false
  api_key: ""
memory_loader:
  port: 9010
db_path: "/data/summy.db"
rate_limit:
  tokens_per_minute: 10
  burst: 3
